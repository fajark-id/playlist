<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koleksi Playlist — Coverflow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <span class="eyebrow">Koleksi Musik</span>
    <h1>Playlist Aku</h1>
    <p>Geser, gunakan tombol panah, atau tekan sampul untuk berpindah. Tekan sampul yang aktif untuk membuka playlist-nya.</p>
  </header>

  <div class="coverflow-wrap">
    <button class="nav-btn" id="prevBtn" aria-label="Sebelumnya">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="coverflow-stage" id="coverflowStage">
      <div class="coverflow-track" id="coverflowTrack"></div>
    </div>

    <button class="nav-btn" id="nextBtn" aria-label="Berikutnya">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="caption">
    <div class="index" id="captionIndex">1 / 15</div>
    <h2 id="captionTitle">Playlist</h2>
    <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none"><path d="M7 17L17 7M17 7H8M17 7v9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Buka playlist
    </a>
  </div>

  <div class="dots" id="dots"></div>

  <button class="autoplay-toggle" id="autoplayToggle">
    <svg id="autoplayIcon" viewBox="0 0 24 24" fill="none"><rect x="5" y="4" width="4" height="16" fill="currentColor"/><rect x="15" y="4" width="4" height="16" fill="currentColor"/></svg>
    <span>Jeda otomatis</span>
  </button>

  <script src="script.js"></script>
</body>
</html>
